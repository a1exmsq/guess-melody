spring:
  application:
    name: guess-melody

  profiles:
    active: dev

  datasource:
    url: jdbc:h2:mem:guessmelodydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  websocket:
    message-size-limit: 65536

server:
  port: ${SERVER_PORT:8080}

# CORS: comma-separated list, e.g. http://localhost:3000,https://guess-melody.example.com
# Defaults to "*" for local development only.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# Spotify credentials are loaded from .env via spring-dotenv
spotify:
  client-id: ${SPOTIFY_CLIENT_ID}
  client-secret: ${SPOTIFY_CLIENT_SECRET}

logging:
  level:
    org.springframework.web.socket: DEBUG
    com.guessmelody: DEBUG
