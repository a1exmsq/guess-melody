version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: guess-melody-db
    environment:
      POSTGRES_DB: guessmelody
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d guessmelody"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
